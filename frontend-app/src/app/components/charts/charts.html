<!-- ============================================
    CHARTS — Role Distribution Doughnut
    ============================================ -->

<div class="chart-card-inner">
  <div class="chart-header">
    <div class="chart-title">Role Distribution</div>
    <div class="chart-subtitle">Admins vs General Users</div>
  </div>
  <div class="chart-canvas-wrap">
    <canvas #userChart></canvas>
  </div>
  <div class="chart-legend">
    <span class="legend-item legend-admin">
      <span class="legend-dot"></span>Admins
    </span>
    <span class="legend-item legend-user">
      <span class="legend-dot"></span>General Users
    </span>
  </div>
</div>
